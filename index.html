<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Gestão Escolar</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="login" class="container">
    <h1>Seja Bem-vindo</h1>
    <p>Portal de Gestão Escolar</p>

    <input id="usuario" placeholder="Usuário"><br><br>
    <input id="senha" type="password" placeholder="Senha"><br><br>

    <button type="button" onclick="fazerLogin()">Entrar</button>
</div>

<!-- SISTEMA -->
<div id="sistema" style="display:none;" class="container">

    <div class="topo">
        <p id="usuarioLogadoTexto"></p>
        <button type="button" onclick="logout()">Sair</button>
    </div>

    <!-- MENU -->
    <div class="menu">
        <button onclick="trocarTela('home')">Home</button>
        <button onclick="trocarTela('dashboard')">Dashboard</button>
        <button onclick="trocarTela('professores')">Professores</button>
        <button onclick="trocarTela('participacao')">Participação</button>
        <button onclick="trocarTela('planejamento')">Planejamento</button>
    </div>

    <hr>

    <!-- TELAS -->

    <div id="home">
        <h1>Bem-vindo ao sistema</h1>
    </div>

    <div id="dashboard" style="display:none;">
        <h1>Dashboard</h1>

        <div class="cards">

            <div class="card">
                <h3>Professores</h3>
                <p id="totalProfessores">0</p>
            </div>

            <div class="card">
                <h3>Sugestões</h3>
                <p id="totalSugestoes">0</p>
            </div>

            <div class="card">
                <h3>Planejamentos</h3>
                <p id="totalPlanos">0</p>
            </div>

        </div>
    </div>

    <div id="professores" style="display:none;">
        <h1>Professores</h1>

        <input id="nomeProfessor" placeholder="Nome do professor">
        <button onclick="addProfessor()">Cadastrar</button>

        <div id="listaProfessores"></div>
    </div>

    <div id="participacao" style="display:none;">
        <h1>Participação</h1>

        <textarea id="textoSugestao" placeholder="Digite uma sugestão"></textarea><br>
        <button onclick="addSugestao()">Enviar</button>

        <div id="listaSugestoes"></div>
    </div>

    <div id="planejamento" style="display:none;">
        <h1>Planejamento de Aula</h1>

        <input id="tema" placeholder="Tema da aula"><br><br>
        <input id="objetivo" placeholder="Objetivo"><br><br>
        <textarea id="conteudo" placeholder="Conteúdo"></textarea><br><br>

        <button onclick="addPlano()">Adicionar Plano</button>

        <div id="listaPlanos"></div>
    </div>

</div>

<script src="index.js"></script>
</body>
</html>
